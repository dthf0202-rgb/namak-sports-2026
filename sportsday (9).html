<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>남악고 체육축제 2026</title>
<style>
:root{
  --bg:#f5f8ff;
  --card:#ffffff;
  --fg:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --primary:#2563eb;
  --primary-light:#dbeafe;
  --accent:#f59e0b;
  --accent-light:#fef3c7;
  --green:#059669;
  --green-light:#d1fae5;
  --red:#dc2626;
  --red-light:#fee2e2;
  --purple:#7c3aed;
  --purple-light:#ede9fe;
  --shadow:0 2px 8px rgba(0,0,0,.06);
  --shadow-md:0 4px 16px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--fg);font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;line-height:1.5}
body{min-height:100vh;padding-bottom:40px}

/* ===== Top Nav ===== */
.nav{
  position:sticky;top:0;z-index:100;
  background:#fff;border-bottom:1px solid var(--border);
  box-shadow:var(--shadow);
}
.nav-inner{
  max-width:1200px;margin:0 auto;
  display:grid;grid-template-columns:auto 1fr auto;align-items:center;
  gap:16px;padding:10px 20px;min-height:72px;
}
.brand{font-size:1.35rem;font-weight:800;color:var(--primary);white-space:nowrap}
.brand small{display:block;font-size:.65rem;font-weight:600;color:var(--muted);letter-spacing:.1em}
.nav-menu{display:flex;justify-content:center;gap:4px;flex-wrap:wrap}
.nav-btn{
  display:flex;align-items:center;gap:6px;
  padding:10px 16px;border:none;background:transparent;cursor:pointer;
  font-size:1.05rem;font-weight:700;color:#374151;
  border-radius:10px;transition:.15s;font-family:inherit;
}
.nav-btn:hover{background:var(--primary-light);color:var(--primary)}
.nav-btn.active{background:var(--primary);color:#fff}
.nav-btn .ico{font-size:1.1rem}
.admin-btn{
  padding:8px 14px;border:1.5px solid var(--border);background:#fff;
  border-radius:10px;font-weight:700;font-size:.9rem;cursor:pointer;color:#374151;
}
.admin-btn.on{background:var(--green);color:#fff;border-color:var(--green)}

@media(max-width:820px){
  .nav-inner{grid-template-columns:1fr auto;padding:8px 12px}
  .nav-menu{grid-column:1/-1;justify-content:flex-start;overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px}
  .nav-btn{font-size:.9rem;padding:8px 12px;flex-shrink:0}
  .brand{font-size:1.1rem}
}

/* ===== Page ===== */
.page{max-width:1200px;margin:0 auto;padding:24px 20px}
.page.hidden{display:none}
.h1{font-size:1.8rem;font-weight:800;margin-bottom:18px}
.h2{font-size:1.25rem;font-weight:800;margin:24px 0 12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;box-shadow:var(--shadow)}

/* ===== Home Hero ===== */
.hero{
  background:linear-gradient(135deg,#dbeafe,#fef3c7);
  border-radius:20px;padding:48px 28px;text-align:center;
  border:1px solid var(--border);
}
.hero-title{
  font-size:3.6rem;font-weight:900;letter-spacing:-.02em;
  background:linear-gradient(135deg,#1e40af,#7c2d12);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  line-height:1.1;
}
.hero-sub{margin-top:12px;font-size:1.1rem;color:#374151;font-weight:600}
.hero-badges{margin-top:18px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:6px 12px;border-radius:999px;background:#fff;
  font-size:.85rem;font-weight:700;color:var(--primary);
  border:1px solid var(--primary-light);
}
@media(max-width:640px){.hero-title{font-size:2.4rem}}

/* ===== Podium (Home preview) ===== */
.tabs{display:flex;gap:6px;margin:16px 0;flex-wrap:wrap}
.tab{
  padding:8px 16px;border:1.5px solid var(--border);background:#fff;
  border-radius:10px;font-weight:700;cursor:pointer;font-family:inherit;font-size:.95rem;
}
.tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}

.podium{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:8px;align-items:end}
.podium-item{
  background:#fff;border:1px solid var(--border);border-radius:14px;
  padding:20px 12px;text-align:center;box-shadow:var(--shadow);
}
.podium-item.gold{background:linear-gradient(135deg,#fef3c7,#fde68a);border-color:#fbbf24;transform:translateY(-10px)}
.podium-item.silver{background:linear-gradient(135deg,#f3f4f6,#e5e7eb);border-color:#9ca3af}
.podium-item.bronze{background:linear-gradient(135deg,#fed7aa,#fdba74);border-color:#fb923c}
.podium-medal{font-size:2rem}
.podium-class{font-size:1.4rem;font-weight:900;margin-top:4px}
.podium-score{font-size:.85rem;color:var(--muted);font-weight:600;margin-top:4px}
.podium-rest{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:14px}
.podium-rest .rest{background:#fff;border:1px solid var(--border);border-radius:10px;padding:8px;text-align:center}
.podium-rest .rest .r{font-size:.7rem;color:var(--muted);font-weight:700}
.podium-rest .rest .c{font-weight:800;margin-top:2px}
.podium-rest .rest .s{font-size:.75rem;color:var(--muted)}
@media(max-width:640px){.podium-rest{grid-template-columns:repeat(3,1fr)}}

.cheer{
  margin-top:14px;background:linear-gradient(135deg,#fce7f3,#fbcfe8);
  border:1px solid #f9a8d4;border-radius:12px;padding:14px;text-align:center;
}
.cheer .l{font-size:.85rem;color:#9d174d;font-weight:700}
.cheer .v{font-size:1.3rem;font-weight:900;color:#831843;margin-top:4px}

/* ===== Schedule ===== */
.now-banner{
  background:linear-gradient(135deg,#fef2f2,#fee2e2);
  border:2px solid #fca5a5;border-radius:14px;padding:14px 18px;
  display:flex;align-items:center;gap:12px;margin-bottom:14px;
}
.now-banner.hidden{display:none}
.now-dot{
  width:12px;height:12px;border-radius:50%;background:#ef4444;
  animation:pulse 1.4s infinite;flex-shrink:0;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.now-text{font-weight:700;color:#991b1b;font-size:.95rem}

.sched-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:780px){.sched-grid{grid-template-columns:1fr}}
.sched-col h3{
  display:flex;align-items:center;gap:8px;
  font-size:1.05rem;margin-bottom:10px;padding:10px 14px;
  background:#fff;border-radius:10px;border:1px solid var(--border);
}
.sched-col.gym h3{border-left:5px solid var(--primary)}
.sched-col.field h3{border-left:5px solid var(--accent)}
.sched-list{display:flex;flex-direction:column;gap:6px}
.sched-item{
  background:#fff;border:1px solid var(--border);border-radius:10px;
  padding:10px 14px;display:flex;align-items:center;gap:12px;
  transition:.2s;border-left:4px solid transparent;
}
.sched-col.gym .sched-item{border-left-color:#bfdbfe}
.sched-col.field .sched-item{border-left-color:#fde68a}
.sched-time{font-weight:700;color:var(--muted);font-size:.85rem;white-space:nowrap;min-width:88px}
.sched-name{font-weight:600;font-size:.95rem;flex:1}
.sched-item.past{opacity:.45}
.sched-item.past .sched-time{text-decoration:line-through}
.sched-item.live{
  background:linear-gradient(135deg,#fef3c7,#fde68a);
  border-color:#f59e0b;border-left-color:#d97706;
  transform:scale(1.02);box-shadow:var(--shadow-md);
  position:relative;
}
.sched-item.live::after{
  content:'LIVE';position:absolute;top:6px;right:8px;
  background:#dc2626;color:#fff;font-size:.65rem;font-weight:900;
  padding:2px 6px;border-radius:4px;animation:pulse 1.4s infinite;
}

/* ===== Results Input ===== */
.event-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.event-card{
  background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px;
  box-shadow:var(--shadow);cursor:pointer;transition:.15s;
}
.event-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--primary)}
.event-card h4{font-size:1.05rem;margin-bottom:6px}
.event-card .small{font-size:.8rem;color:var(--muted)}
.event-card.adminonly{border:2px dashed #a78bfa;background:#faf5ff}
.event-card .adminonly-tag{
  display:inline-block;background:var(--purple);color:#fff;
  font-size:.65rem;font-weight:800;padding:2px 6px;border-radius:4px;margin-left:4px;
}
.event-result{margin-top:10px;font-size:.85rem;color:var(--fg)}
.event-result .row{padding:3px 0;border-top:1px dashed #eee}
.event-result .row:first-child{border-top:0}
.event-result .place{font-weight:800;color:var(--primary);margin-right:6px}

/* Modal */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;
  align-items:center;justify-content:center;z-index:200;padding:16px;
}
.modal-bg.show{display:flex}
.modal{
  background:#fff;border-radius:16px;padding:24px;max-width:540px;width:100%;
  max-height:90vh;overflow-y:auto;
}
.modal h3{font-size:1.3rem;margin-bottom:16px}
.modal-section{margin-bottom:16px}
.modal-label{font-weight:800;margin-bottom:8px;font-size:.95rem}
.modal-label .pts{font-size:.75rem;color:var(--primary);margin-left:6px;font-weight:700}
.chk-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.chk{
  display:flex;align-items:center;justify-content:center;
  padding:10px 4px;border:1.5px solid var(--border);border-radius:8px;
  cursor:pointer;font-weight:700;background:#fff;font-size:.9rem;user-select:none;
}
.chk input{display:none}
.chk.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.modal-select{
  width:100%;padding:10px;border:1.5px solid var(--border);border-radius:8px;
  font-family:inherit;font-size:.95rem;
}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btns button{
  flex:1;padding:12px;border:none;border-radius:10px;font-weight:800;
  cursor:pointer;font-family:inherit;font-size:.95rem;
}
.btn-save{background:var(--primary);color:#fff}
.btn-cancel{background:#f3f4f6;color:#374151}
.btn-del{background:var(--red);color:#fff}

/* ===== Score table ===== */
.score-table{
  background:#fff;border:1px solid var(--border);border-radius:12px;
  overflow-x:auto;margin-top:8px;
}
.score-table table{width:100%;border-collapse:collapse;min-width:640px}
.score-table th,.score-table td{
  padding:8px 6px;text-align:center;border-bottom:1px solid var(--border);
  font-size:.85rem;
}
.score-table thead{background:#f9fafb}
.score-table th{font-weight:800;color:#374151}
.score-table .total{font-weight:900;background:#eff6ff;color:var(--primary);font-size:1rem}
.score-table tr.rank1 td.total{background:#fef3c7;color:#92400e}
.score-table tr.rank2 td.total{background:#f3f4f6;color:#374151}
.score-table tr.rank3 td.total{background:#fed7aa;color:#9a3412}

/* ===== Board ===== */
.board-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.board-item{
  background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px;
  border-left:5px solid var(--primary);
}
.board-item.alert{border-left-color:var(--red);background:#fef2f2}
.board-item.warn{border-left-color:var(--accent);background:#fffbeb}
.board-item h4{font-size:1.05rem;margin-bottom:8px}
.board-item ul{margin-left:18px;font-size:.92rem;color:#374151;line-height:1.7}

/* ===== 경기요강 ===== */
.guide-item{
  background:#fff;border:1px solid var(--border);border-radius:12px;
  margin-bottom:10px;overflow:hidden;
}
.guide-head{
  padding:14px 18px;cursor:pointer;display:flex;justify-content:space-between;
  align-items:center;font-weight:800;
}
.guide-head:hover{background:#f9fafb}
.guide-body{padding:0 18px 16px;display:none;color:#374151;font-size:.92rem;line-height:1.7}
.guide-body.show{display:block}
.guide-body p{margin:6px 0}
.guide-body .pill{
  display:inline-block;padding:2px 8px;background:var(--primary-light);
  color:var(--primary);border-radius:6px;font-size:.78rem;font-weight:700;margin-right:4px;
}
.guide-body ul{margin-left:18px}
.guide-head .arrow{transition:.2s}
.guide-head.open .arrow{transform:rotate(90deg)}

.note{
  background:var(--purple-light);border:1px solid var(--purple);
  border-radius:10px;padding:10px 14px;color:#5b21b6;font-weight:700;
  font-size:.9rem;margin-bottom:12px;
}
</style>
</head>

/* ========================== STATE ========================== */
const PWD='0202';
const LS_KEY='nag-sportsday-2026';
let state=loadState();
let admin=false;
let currentPage='home';

function defaultState(){
  const results={};
  for(const g of GRADES){results[g]={};for(const e of EVENTS){results[g][e.id]={1:[],2:[],3:[],4:[]}}}
  return {results,cheer:{1:null,2:null,3:null}};
}
function loadState(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw) return defaultState();
    const s=JSON.parse(raw);
    const d=defaultState();
    if(s.results)for(const g of GRADES){for(const e of EVENTS){
      if(s.results[g]&&s.results[g][e.id]){
        for(const p of [1,2,3,4]){
          const v=s.results[g][e.id][p];
          d.results[g][e.id][p]=Array.isArray(v)?v:(v?[v]:[]);
        }
      }
    }}
    if(s.cheer)for(const g of GRADES)d.cheer[g]=s.cheer[g]||null;
    return d;
  }catch(e){return defaultState()}
}
function saveState(){localStorage.setItem(LS_KEY,JSON.stringify(state))}

function renderNav(){
  const menu=document.getElementById('navMenu');
  menu.innerHTML=PAGES.map(p=>`<button class="nav-btn ${currentPage===p.id?'active':''}" data-page="${p.id}"><span class="ico">${p.icon}</span><span>${p.name}</span></button>`).join('');

function go(id){

function toggleAdmin(){
  if(admin){admin=false;renderNav();if(currentPage==='results')renderResults();return}
  const p=prompt('관리자 비밀번호 입력');
  if(p===PWD){admin=true;renderNav();if(currentPage==='results')renderResults();alert('관리자 모드 ON');}

/* ========================== SCORING ========================== */
function classScore(grade,cls){
  let s=0;
  for(const e of EVENTS){
    const r=state.results[grade][e.id];
    for(const p of [1,2,3,4]){if(r[p]&&r[p].includes(cls))s+=e.pts[p-1]}
  }
  return s;
}
function classScoreVisible(grade,cls){
  // students don't see admin-only events; admin sees full
  let s=0;
  for(const e of EVENTS){
    if(e.adminOnly&&!admin)continue;
    const r=state.results[grade][e.id];
    for(const p of [1,2,3,4]){if(r[p]&&r[p].includes(cls))s+=e.pts[p-1]}
  }
  return s;
}
function rankList(grade){
  const arr=CLASSES.map(c=>({cls:c,score:classScoreVisible(grade,c)}));
  arr.sort((a,b)=>b.score-a.score||a.cls-b.cls);
  return arr;
}

/* ========================== SCHEDULE ========================== */
let scheduleDay='day1';
function parseHM(s){const [h,m]=s.split(':').map(Number);return h*60+m}
function nowMinutesIfDate(dateStr){
  const now=new Date();
  const Y=now.getFullYear(),M=String(now.getMonth()+1).padStart(2,'0'),D=String(now.getDate()).padStart(2,'0');
  if(`${Y}-${M}-${D}`!==dateStr)return null;
  return now.getHours()*60+now.getMinutes();
}
function renderSchedule(){
  const day=SCHEDULE[scheduleDay];
  const nm=nowMinutesIfDate(day.date);
  const live=[];
  const renderCol=(items,colName)=>items.map(([s,e,t])=>{
    const sm=parseHM(s),em=parseHM(e);
    let cls='sched-item';
    if(nm!=null){
      if(nm>=sm&&nm<em){cls+=' live';live.push((colName==='gym'?'🏛️':'⚽')+' '+t)}
      else if(nm>=em)cls+=' past';
    }
    return `<div class="${cls}"><div class="sched-time">${s}~${e}</div><div class="sched-name">${t}</div></div>`;
  }).join('');

  document.getElementById('page-schedule').innerHTML=`
    <h1 class="h1">📅 시간표</h1>
    <div class="now-banner ${live.length?'':'hidden'}"><div class="now-dot"></div><div class="now-text">NOW PLAYING: ${live.join(' / ')}</div></div>
    <div class="tabs">
      ${Object.entries(SCHEDULE).map(([k,v])=>`<button class="tab ${scheduleDay===k?'active':''}" data-d="${k}">${v.label}</button>`).join('')}
    </div>
    <div class="sched-grid">
      <div class="sched-col gym"><h3>🏛️ 강당</h3><div class="sched-list">${renderCol(day.gym,'gym')}</div></div>
      <div class="sched-col field"><h3>⚽ 운동장</h3><div class="sched-list">${renderCol(day.field,'field')}</div></div>
    </div>
  `;
  document.querySelectorAll('#page-schedule .tab').forEach(t=>t.onclick=()=>{scheduleDay=t.dataset.d;renderSchedule()});
}

function openResultModal(eid){
  const ev=EVENTS.find(e=>e.id===eid);
  const r=state.results[resGrade][eid];
  // 등수별 입력 UI 형태 결정
  // gugi: 모든 등수 다중(최대 2)
  // multi: 모든 등수 다중(무제한)
  // single: 1·2·3위 단일 dropdown, 4위 다중
  // media: 1·2·3·4위 각 1개 단일
  const isCheckbox=(p)=>{
    if(ev.type==='gugi')return true;
    if(ev.type==='multi')return true;
    if(ev.type==='single')return p===4;
    if(ev.type==='media')return false;
    return false;
  };
  const sectionFor=(p)=>{
    const sel=r[p]||[];
    if(isCheckbox(p)){
      return `
      <div class="modal-section">
        <div class="modal-label">${p}위 <span class="pts">+${ev.pts[p-1]}점</span> ${ev.type==='gugi'?'<span style="font-size:.7rem;color:var(--muted);font-weight:700">(최대 2개반)</span>':p===4&&ev.type==='single'?'<span style="font-size:.7rem;color:var(--muted);font-weight:700">(여러 반 선택 가능)</span>':'<span style="font-size:.7rem;color:var(--muted);font-weight:700">(여러 반 선택 가능)</span>'}</div>
        <div class="chk-grid" data-rank="${p}">
          ${CLASSES.map(c=>`<label class="chk ${sel.includes(c)?'on':''}"><input type="checkbox" value="${c}" ${sel.includes(c)?'checked':''}>${c}반</label>`).join('')}
        </div>
      </div>`;
    } else {
      // single dropdown
      return `
      <div class="modal-section">
        <div class="modal-label">${p}위 <span class="pts">+${ev.pts[p-1]}점</span></div>
        <select class="modal-select" data-rank="${p}">
          <option value="">-- 선택 안 함 --</option>
          ${CLASSES.map(c=>`<option value="${c}" ${sel[0]===c?'selected':''}>${c}반</option>`).join('')}
        </select>
      </div>`;
    }
  };
  document.getElementById('modalBox').innerHTML=`
    <h3>${ev.name} — ${resGrade}학년 결과 입력</h3>
    ${[1,2,3,4].map(sectionFor).join('')}
    <div class="modal-btns">
      <button class="btn-del" id="rClear">초기화</button>
      <button class="btn-cancel" id="rCancel">취소</button>
      <button class="btn-save" id="rSave">저장</button>
    </div>
  `;
  // checkbox toggle
  document.querySelectorAll('#modalBox .chk-grid .chk').forEach(l=>{
    l.onclick=(e)=>{
      if(e.target.tagName==='INPUT')return;
      const inp=l.querySelector('input');inp.checked=!inp.checked;
      l.classList.toggle('on',inp.checked);
      // gugi limit 2 per rank
      const rank=+l.parentElement.dataset.rank;
      if(ev.type==='gugi'){
        const checked=l.parentElement.querySelectorAll('input:checked');
        if(checked.length>2){alert('구기 종목은 한 등수에 최대 2개반까지 선택할 수 있습니다.');inp.checked=false;l.classList.remove('on')}
      }
    };
  });
  document.getElementById('rClear').onclick=()=>{state.results[resGrade][eid]={1:[],2:[],3:[],4:[]};saveState();closeModal();renderResults()};
  document.getElementById('rCancel').onclick=closeModal;
  document.getElementById('rSave').onclick=()=>{
    const newR={1:[],2:[],3:[],4:[]};
    for(const p of [1,2,3,4]){
      if(isCheckbox(p)){
        const grid=document.querySelector(`#modalBox .chk-grid[data-rank="${p}"]`);
        newR[p]=Array.from(grid.querySelectorAll('input:checked')).map(x=>+x.value);
      }else{
        const s=document.querySelector(`#modalBox select[data-rank="${p}"]`);
        newR[p]=s.value?[+s.value]:[];
      }
    }
    // duplicate check
    const seen={};
    for(const p of [1,2,3,4]){for(const c of newR[p]){
      if(seen[c]){alert(`${c}반이 ${seen[c]}위와 ${p}위에 중복 선택되었습니다.`);return}
      seen[c]=p;
    }}
    state.results[resGrade][eid]=newR;saveState();closeModal();renderResults();
  };
  document.getElementById('modalBg').classList.add('show');
}
function closeModal(){document.getElementById('modalBg').classList.remove('show')}
document.getElementById('modalBg').onclick=(e)=>{if(e.target.id==='modalBg')closeModal()};

/* ========================== SCORE TABLE ========================== */
let scoreGrade=1;
function renderScores(){
  const el=document.getElementById('page-scores');
  const evs=EVENTS.filter(e=>!e.adminOnly||admin);
  const ranks=rankList(scoreGrade);
  const rankByCls={};ranks.forEach((r,i)=>rankByCls[r.cls]=i+1);
  el.innerHTML=`
    <h1 class="h1">📊 점수표</h1>
    ${admin?'<div class="note">관리자 모드: 베스트 사진 · 릴스 챌린지 점수가 포함되어 표시됩니다.</div>':'<div class="note" style="background:#eff6ff;border-color:#3b82f6;color:#1e40af">베스트 사진 · 릴스 챌린지는 행사 종료 후 공개됩니다.</div>'}
    <div class="tabs">
      ${GRADES.map(g=>`<button class="tab ${scoreGrade===g?'active':''}" data-g="${g}">${g}학년</button>`).join('')}
    </div>
    <div class="score-table">
      <table>
        <thead>
          <tr><th>종목</th>${CLASSES.map(c=>`<th>${c}반</th>`).join('')}</tr>
        </thead>
        <tbody>
          ${evs.map(e=>{
            const r=state.results[scoreGrade][e.id];
            return `<tr><td style="text-align:left;font-weight:700">${e.name}${e.adminOnly?'<span class="adminonly-tag">관리자</span>':''}</td>${CLASSES.map(c=>{
              let pts=0;for(const p of [1,2,3,4]){if(r[p]&&r[p].includes(c))pts=e.pts[p-1]}
              return `<td>${pts||'-'}</td>`;
            }).join('')}</tr>`;
          }).join('')}
          <tr><td style="text-align:left;font-weight:900">합계</td>${CLASSES.map(c=>{
            const rk=rankByCls[c];
            const cls=rk<=3?`rank${rk}`:'';
            return `<td class="total"><span class="${cls?cls:''}">${classScoreVisible(scoreGrade,c)}</span></td>`;
          }).join('')}</tr>
          <tr><td style="text-align:left;font-weight:900">순위</td>${CLASSES.map(c=>{
            const rk=rankByCls[c];const m=rk===1?'🥇':rk===2?'🥈':rk===3?'🥉':rk;
            return `<td style="font-weight:800">${m}</td>`;
          }).join('')}</tr>
        </tbody>
      </table>
    </div>
    ${state.cheer[scoreGrade]?`<div class="cheer" style="max-width:400px;margin:14px auto 0"><div class="l">📢 ${scoreGrade}학년 응원상</div><div class="v">${state.cheer[scoreGrade]}반</div></div>`:''}
  `;
  el.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{scoreGrade=+t.dataset.g;renderScores()});
}
